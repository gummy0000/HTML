<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/a4.css">
</head>
<body>
    <form>
        <div class="login-container">
            <h2>로그인</h2>
            <div class="input-group">
                <label for="name">이름<p>*</p></label>
                <input type="text" id="name" name="name" required><br>
            </div>
            <div class="input-group">
                <label for="email">이매일<p>*</p></label>
                <input type="email" id="email" name="email" required><br>
            </div>
            <div class="input-group">
                <label for="pass">비밀번호<p>*</p></label>
                <input type="password" id="pass" name="pass" required><br>
            </div>
            <div class="input-group">
                <label for="pass2">비밀번호 확인<p>*</p></label>
                <input type="password" id="pass2" name="pass2" required><br>
            </div>
            <button type="submit" class="signup">회원가입</button>
        </div>
    </form>
</body>
</html>
